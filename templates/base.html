<!---- base Header and footer section----------->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Clean Blog-Start Bootstrap Website {% endblock %}</title>
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">

    <!-- CSS Bootstrap Theme-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon"  type="image/x-icon" href="{{url_for('static', filename = 'images/favicon.ico')}}">
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
    <!-- Google Awesome 4 Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>
<body>
<!-- Your content goes here Navbar -->
    <section id="nav-bar">
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container">
    <a class="navbar-brand" href="{{url_for('home')}}">My Blog </a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{{url_for('home')}}">Home</a>
        </li>
          <li class="nav-item">
          <a class="nav-link" href="{{url_for('about')}}">About</a>
        </li>
          <li class="nav-item">
              <a class="nav-link" href="{{url_for('contact')}}">Contact</a>
          </li>
        <li class="nav-item">
          <a class="nav-link" href="{{url_for('create')}}">Create Post</a>
        </li>

      </ul>
    </div>
  </div>
</nav>
    </section>
        <!---Main content---------->
        {% block header %}{% endblock %}
    <main class="container mt-5 pt-5">{% block content %} {% endblock %}
</main>
        <!-------Bootstrap 5 JS----------------->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
        </script>

</body>
</html>
